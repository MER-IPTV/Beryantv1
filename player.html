<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>BSR Gold Player - Original Structure</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden;touch-action:manipulation}

/* --- نظام الدوران الإجباري 90 درجة للهيكل الأصلي --- */
#player-root {
    position: fixed;
    width: 100vh; /* العرض يصبح طول الشاشة */
    height: 100vw; /* الطول يصبح عرض الشاشة */
    top: 50%;
    left: 50%;
    background: #000;
    transform: translate(-50%, -50%) rotate(90deg);
    z-index: 1000;
}

.player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }

video {
    position: absolute; inset: 0; width: 100%; height: 100%; background: #000;
    object-fit: fill; /* ملء الشاشة بالكامل */
}

/* --- السمة الذهبية الملكية --- */
#loading, #buffer {
    position: absolute; z-index: 60; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 50%; border: 5px solid rgba(212, 175, 55, 0.2);
    border-top-color: #D4AF37; animation: spin 1s linear infinite; display: none;
}
#loading { width: 52px; height: 52px; } #buffer { width: 86px; height: 86px; }
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

.title { color: #D4AF37; font-weight: 800; font-size: 15px; text-shadow: 0 1px 2px #000; }
.server-btn { flex:0 0 auto; border:1px solid rgba(212,175,55,.4); background:transparent; color:#fff; padding:6px 14px; border-radius:999px; font-weight:700; cursor:pointer; }
.server-btn.active { background: #D4AF37; color: #000; border-color: #D4AF37; }
.played, .thumb { background: #D4AF37 !important; }
.big { border-color: #D4AF37 !important; color: #D4AF37 !important; }
.icon { border: 1px solid rgba(212,175,55,.3); background: transparent; color: #fff; border-radius: 12px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }

/* --- توزيع العناصر الأساسية --- */
.server-bar { position: absolute; top: 15px; left: 15px; z-index: 130; display: flex; gap: 8px; opacity: 0; transition: .3s; }
.top { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; align-items: center; justify-content: space-between; z-index: 80; opacity: 0; transition: .3s; }
.center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 25px; z-index: 80; opacity: 0; transition: .3s; }
.bottom { position: absolute; bottom: 0; width: 100%; padding: 15px 15px 25px; z-index: 80; opacity: 0; transition: .3s; }
.visible { opacity: 1 !important; pointer-events: auto; }

.progress { height: 5px; background: rgba(255,255,255,.2); border-radius: 5px; margin-bottom: 15px; position: relative; }
.played { position: absolute; height: 100%; width: 0; }
.row { display: flex; align-items: center; justify-content: space-between; direction: ltr; }
.icons-set { display: flex; gap: 10px; direction: rtl; }

#toast { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(212,175,55,0.95); color: #000; padding: 10px 20px; border-radius: 20px; display: none; z-index: 200; font-weight: 800; }
#tapStart { position: absolute; inset: 0; z-index: 150; background: #000; color: #D4AF37; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; text-align: center; cursor: pointer; }
</style>
</head>
<body>

<div id="player-root">
    <div class="player-wrapper" id="wrap">
        <div class="server-bar" id="serverBar"></div>
        <video id="video" playsinline webkit-playsinline autoplay></video>
        
        <div id="tapStart">انقر لبدء المشغل الذهبي 🔄<br><small style="font-size:12px; font-weight:400">وضع الدوران مفعل تلقائياً</small></div>

        <div id="loading"></div>
        <div id="buffer"></div>

        <div class="top" id="top">
            <button class="icon" onclick="history.back()"><i data-feather="arrow-right"></i></button>
            <div class="title" id="title">BSR GOLD PLAYER</div>
            <div style="width:42px"></div>
        </div>

        <div class="center" id="center">
            <button class="icon" id="rew" style="border-radius:50%; width:55px; height:55px"><i data-feather="rotate-ccw"></i></button>
            <button class="icon big" id="play" style="border-radius:50%; width:80px; height:80px"><i data-feather="pause"></i></button>
            <button class="icon" id="fwd" style="border-radius:50%; width:55px; height:55px"><i data-feather="rotate-cw"></i></button>
        </div>

        <div class="bottom" id="bottom">
            <div class="progress" id="progress"><div class="played" id="played"></div></div>
            <div class="row">
                <div id="time" style="color:#fff; font-size:14px; font-weight:700">00:00 • 00:00</div>
                <div class="icons-set">
                    <button class="icon" id="mute"><i data-feather="volume-2"></i></button>
                    <button class="icon" id="full"><i data-feather="maximize"></i></button>
                    <button class="icon" id="fit"><i data-feather="move"></i></button>
                </div>
            </div>
        </div>
        
        <div id="toast"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    feather.replace();
    const $ = id => document.getElementById(id);
    const video = $("video"), wrap = $("wrap"), tapStart = $("tapStart");
    let hideTimer;

    const WORKER = "https://ali.albesriali8.workers.dev/";

    // دالة إظهار التنبيهات
    function flash(t) { 
        const tst = $("toast"); tst.textContent=t; tst.style.display="block"; 
        setTimeout(()=>tst.style.display="none", 3000); 
    }

    // التحكم بالواجهة
    function showControls() {
        $("top").classList.add("visible"); $("bottom").classList.add("visible"); 
        $("center").classList.add("visible"); $("serverBar").classList.add("visible");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(hideControls, 4000);
    }
    function hideControls() {
        $("top").classList.remove("visible"); $("bottom").classList.remove("visible"); 
        $("center").classList.remove("visible"); $("serverBar").classList.remove("visible");
    }

    // جلب الروابط والسيرفرات (الهيكل الأصلي)
    const getP = () => new URLSearchParams(location.search);
    const get = k => { try { return decodeURIComponent(getP().get(k) || ""); } catch { return ""; } };

    async function initPlayer() {
        let url = get("url");
        if(!url) return;
        $("title").textContent = get("title") || "BSR GOLD PLAYER";
        
        $("loading").style.display = "block";

        if(url.includes(".mpd")) {
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);
            await player.load(url);
        } else if(url.includes(".m3u8") || url.includes(".png")) {
            if(Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url.includes("http") ? url : WORKER + "?url=" + encodeURIComponent(url));
                hls.attachMedia(video);
            } else { video.src = url; }
        } else {
            video.src = url;
        }
        $("loading").style.display = "none";
    }

    // أحداث النقر والتحكم
    tapStart.onclick = () => {
        tapStart.style.display = "none";
        video.play();
        flash("وضع الدوران الملكي مفعل 🔄");
        showControls();
    };

    wrap.onclick = showControls;

    $("play").onclick = (e) => {
        e.stopPropagation();
        if(video.paused) video.play(); else video.pause();
    };

    $("mute").onclick = (e) => {
        e.stopPropagation();
        video.muted = !video.muted;
        $("mute").innerHTML = `<i data-feather="${video.muted ? 'volume-x' : 'volume-2'}"></i>`;
        feather.replace();
    };

    $("fwd").onclick = (e) => { e.stopPropagation(); video.currentTime += 10; };
    $("rew").onclick = (e) => { e.stopPropagation(); video.currentTime -= 10; };

    video.onplay = () => { $("play").innerHTML='<i data-feather="pause"></i>'; feather.replace(); };
    video.onpause = () => { $("play").innerHTML='<i data-feather="play"></i>'; feather.replace(); };

    // تحديث شريط التقدم والوقت
    video.ontimeupdate = () => {
        const p = (video.currentTime / video.duration) * 100;
        $("played").style.width = p + "%";
        const fmt = s => new Date(s * 1000).toISOString().substr(14, 5);
        if(video.duration) $("time").textContent = `${fmt(video.currentTime)} • ${fmt(video.duration)}`;
        else $("time").textContent = "بث مباشر • LIVE";
    };

    initPlayer();
});
</script>
</body>
</html>
