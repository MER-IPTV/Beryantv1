<html dir="rtl" lang="ar"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/><title>BSR Player Gold Rotate</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
<style>
:root { --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.3); }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden}

/* الحاوية الرئيسية التي ستدور بالكامل */
#player-root {
    position: fixed; inset: 0; width: 100vw; height: 100vh; 
    background: #000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center; display: flex; align-items: center; justify-content: center;
}

/* الفيديو يملأ الحاوية دائماً */
video { width: 100%; height: 100%; object-fit: fill; background: #000; }

/* أزرار السيرفرات */
.server-bar{position:absolute;top:20px;left:20px;z-index:130;display:none;gap:8px;opacity:0;transition:.25s;direction:ltr}.server-bar.visible{display:flex;opacity:1}
.server-btn{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 15px;border-radius:20px;font-weight:bold;cursor:pointer}.server-btn.active{background:var(--gold);color:#000}

/* واجهة التحكم */
.controls-layer { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.controls-layer.visible { opacity: 1; pointer-events: auto; }

.top { padding: 20px; display: flex; align-items: center; gap: 15px; }
.center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 30px; }
.bottom { padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }

/* الأيقونات والأزرار باللون الذهبي */
.btn, .icon, .circle { 
    background: rgba(0,0,0,0.5); border: 1.5px solid var(--gold); 
    color: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; 
}
.btn, .icon { width: 45px; height: 45px; border-radius: 12px; }
.circle { width: 70px; height: 70px; border-radius: 50%; }
.circle.small { width: 55px; height: 55px; position: relative; }
.circle.small span { position: absolute; font-size: 11px; font-weight: bold; bottom: 8px; }

.title { color: var(--gold); font-weight: 800; font-size: 18px; text-shadow: 0 2px 4px #000; }
.progress-container { height: 6px; background: rgba(212, 175, 55, 0.2); border-radius: 3px; margin-bottom: 15px; position: relative; cursor: pointer; }
.progress-bar { height: 100%; background: var(--gold); width: 0%; border-radius: 3px; box-shadow: 0 0 10px var(--gold); }

.controls-row { display: flex; align-items: center; justify-content: space-between; direction: ltr; }
.time-info { color: var(--gold); font-size: 14px; font-weight: bold; }
.actions { display: flex; gap: 12px; direction: rtl; }

#loading { position: absolute; width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; z-index: 150; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* وضع الدوران العرضي المخصص */
.rotated { width: 100vh !important; height: 100vw !important; transform: rotate(90deg); }
</style></head><body>

<div id="player-root">
    <video id="video" playsinline></video>
    <div id="loading"></div>
    
    <div class="server-bar" id="serverBar"></div>

    <div class="controls-layer" id="controls">
        <div class="top">
            <button class="btn" onclick="history.back()"><i data-feather="arrow-right"></i></button>
            <div class="title" id="title">BSR Gold Player</div>
        </div>

        <div class="center">
            <button class="circle small" onclick="seek(-5)"><i data-feather="rotate-ccw"></i><span>5</span></button>
            <button class="circle" id="playBtn" onclick="togglePlay()"><i data-feather="pause"></i></button>
            <button class="circle small" onclick="seek(15)"><i data-feather="rotate-cw"></i><span>15</span></button>
        </div>

        <div class="bottom">
            <div class="progress-container" onclick="seekTo(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="controls-row">
                <div class="time-info" id="timeDisplay">00:00 / 00:00</div>
                <div class="actions">
                    <button class="icon" onclick="toggleFullscreen()"><i data-feather="maximize"></i></button>
                    <button class="icon" id="rotateBtn"><i data-feather="refresh-cw"></i></button>
                    <button class="icon" onclick="toggleMute()"><i id="muteIcon" data-feather="volume-2"></i></button>
                    <button class="icon" onclick="changeFit()"><i data-feather="layers"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const root = document.getElementById('player-root');
    const controls = document.getElementById('controls');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const timeDisplay = document.getElementById('timeDisplay');
    const rotateBtn = document.getElementById('rotateBtn');
    
    let isRotated = false;
    let hideTimeout;

    // تفعيل أيقونات Feather
    feather.replace();

    // إظهار/إخفاء عناصر التحكم
    function showControls() {
        controls.classList.add('visible');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => controls.classList.remove('visible'), 3000);
    }
    root.onclick = showControls;

    // وظيفة التشغيل
    function togglePlay() {
        if(video.paused) video.play(); else video.pause();
        updatePlayIcon();
    }
    function updatePlayIcon() {
        playBtn.innerHTML = video.paused ? '<i data-feather="play"></i>' : '<i data-feather="pause"></i>';
        feather.replace();
    }

    // وظيفة الدوران (تدوير الشاشة بالكامل مع الأزرار)
    rotateBtn.onclick = (e) => {
        e.stopPropagation();
        isRotated = !isRotated;
        if(isRotated) {
            root.classList.add('rotated');
        } else {
            root.classList.remove('rotated');
        }
    };

    // تحديث شريط التقدم
    video.ontimeupdate = () => {
        const pct = (video.currentTime / video.duration) * 100;
        progressBar.style.width = pct + '%';
        timeDisplay.innerText = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
    };

    function formatTime(t) {
        if(isNaN(t)) return "00:00";
        let m = Math.floor(t/60), s = Math.floor(t%60);
        return (m<10?'0'+m:m) + ":" + (s<10?'0'+s:s);
    }

    function seek(val) { video.currentTime += val; }
    function seekTo(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('muteIcon').setAttribute('data-feather', video.muted ? 'volume-x' : 'volume-2');
        feather.replace();
    }

    let fits = ['fill', 'contain', 'cover'];
    let currentFit = 0;
    function changeFit() {
        currentFit = (currentFit + 1) % fits.length;
        video.style.objectFit = fits[currentFit];
    }

    async function toggleFullscreen() {
        if (!document.fullscreenElement) {
            await root.requestFullscreen().catch(err => {});
        } else {
            document.exitFullscreen();
        }
    }

    // جلب الرابط من الـ URL (كما في كودك الأصلي)
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('url');
    if(streamUrl) {
        if(streamUrl.includes('.m3u8')) {
            if(Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(streamUrl); hls.attachMedia(video);
            } else { video.src = streamUrl; }
        } else { video.src = streamUrl; }
    }

    video.onwaiting = () => document.getElementById('loading').style.display = 'block';
    video.onplaying = () => document.getElementById('loading').style.display = 'none';

</script>
</body></html>
