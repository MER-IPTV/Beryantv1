<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BERYAN Player - Pure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #8a2be2;
            --dark-purple: #1a1a2e;
            --accent-purple: #bc6ff1;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* --- حاوية المشغل --- */
        #player-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; background: #000; 
        }
        
        #player { 
            position: relative; width: 100vw; height: 100vh; 
            background: #000; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; 
        }

        video { width: 100%; height: 100%; object-fit: contain; z-index: 10; }

        /* --- شاشة التحميل --- */
        #loadingScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-purple); z-index: 500; display: none;
        }
        .loading-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
        }
        .loader-spinner { 
            width: 60px; height: 60px; border: 5px solid rgba(138, 43, 226, 0.1); 
            border-top: 5px solid var(--primary-purple); border-radius: 50%; 
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- عناصر التحكم --- */
        .top-bar { 
            position: absolute; top: 20px; left: 20px; right: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; transition: 0.5s; 
        }
        .q-btn { 
            width: 45px; height: 45px; border-radius: 10px; border: none; 
            background: rgba(40, 30, 60, 0.8); color: #fff; font-weight: bold; cursor: pointer; 
        }
        .q-btn.active { border: 2px solid var(--primary-purple); color: var(--accent-purple); }

        .progress-area { 
            position: absolute; bottom: 90px; left: 20px; right: 20px; 
            height: 4px; background: rgba(255,255,255,0.2); z-index: 1000; border-radius: 2px; 
        }
        .progress-bar { height: 100%; background: var(--primary-purple); width: 0%; box-shadow: 0 0 8px var(--primary-purple); }

        .bottom-bar { 
            position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px; 
            display: flex; justify-content: center; align-items: center; gap: 20px; 
            z-index: 1000; transition: 0.5s; 
        }
        .control-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            background: rgba(60, 40, 100, 0.7); color: #fff; font-size: 18px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(5px);
        }

        .hide { opacity: 0; pointer-events: none; transform: translateY(10px); }
    </style>
</head>
<body>

<div id="player-overlay">
    <div id="player">
        <!-- شاشة التحميل -->
        <div id="loadingScreen">
            <div class="loading-content">
                <div class="loader-spinner"></div>
                <div style="color: white; font-family: sans-serif;">جاري التحميل...</div>
            </div>
        </div>

        <video id="video" autoplay playsinline></video>

      
        <!-- شريط التقدم -->
        <div class="progress-area" id="progArea">
            <div class="progress-bar" id="progBar"></div>
        </div>

        <!-- التحكم السفلي -->
        <div class="bottom-bar" id="bottomUI">
            <button class="control-btn" onclick="video.currentTime -= 10"><i class="fas fa-backward"></i></button>
            <button class="control-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-pause"></i></button>
            <button class="control-btn" onclick="video.currentTime += 10"><i class="fas fa-forward"></i></button>
            <button class="control-btn" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const loader = document.getElementById('loadingScreen');
    let hls, timer;
    
    // ضع روابط البث هنا للتجربة
    let linkHD = "رابط_الجودة_العالية_هنا"; 
    let linkSD = "رابط_الجودة_العادية_هنا";

    function playStream(url) {
        if (hls) hls.destroy();
        loader.style.display = "block";
        
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    function switchQual(type) {
        const target = (type === 'hd') ? linkHD : linkSD;
        document.getElementById('btnHD').classList.toggle('active', type === 'hd');
        document.getElementById('btnSD').classList.toggle('active', type === 'sd');
        playStream(target);
    }

    function togglePlay() {
        const btn = document.getElementById('playBtn');
        if (video.paused) { video.play(); btn.innerHTML = '<i class="fas fa-pause"></i>'; }
        else { video.pause(); btn.innerHTML = '<i class="fas fa-play"></i>'; }
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // إخفاء وإظهار القوائم
    function resetTimer() {
        const ui = [document.getElementById('topUI'), document.getElementById('bottomUI'), document.getElementById('progArea')];
        ui.forEach(el => el.classList.remove('hide'));
        clearTimeout(timer);
        timer = setTimeout(() => ui.forEach(el => el.classList.add('hide')), 4000);
    }

    video.onplaying = () => { loader.style.display = "none"; resetTimer(); };
    video.onwaiting = () => { loader.style.display = "block"; };
    video.addEventListener('timeupdate', () => {
        if (video.duration) document.getElementById('progBar').style.width = (video.currentTime / video.duration) * 100 + '%';
    });
    document.getElementById('player').onclick = resetTimer;

    // لبدء التشغيل تلقائياً عند فتح الصفحة (اختياري)
    // switchQual('hd');
</script>

</body>
</html>
