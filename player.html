<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Beryan Player Mobile</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000000"/>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden;overscroll-behavior:none;touch-action:manipulation}
body{position:fixed;inset:0;padding:0!important;background:#000}

#player-root {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vh;
    height: 100vw;
    transform: translate(-50%, -50%) rotate(90deg);
    background: #000;
    overflow: hidden;
}

.player-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
}

video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
    object-fit: contain; 
    filter: contrast(1.06) saturate(1.12);
}

video.fit-contain{object-fit:contain!important}
video.fit-cover{object-fit:cover!important}
video.fit-fill{object-fit:fill!important}

.server-bar{
  position:absolute;top:16px;left:12px;right:auto;z-index:130;display:none;gap:8px;
  padding:6px;max-width:min(72vw,760px);overflow-x:auto;direction:ltr;
  background:transparent;border:0;border-radius:999px;
  scrollbar-width:none;opacity:0;transition:.25s
}
.server-bar.visible{display:flex;opacity:1}
.server-btn{flex:0 0 auto;border:1px solid rgba(168, 85, 247, 0.4);background:transparent;color:#A855F7;padding:8px 14px;border-radius:999px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer;white-space:nowrap;text-shadow:0 1px 2px #000}
.server-btn.active{background:#A855F7;color:#fff}

#loading,#buffer{position:absolute;z-index:60;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:5px solid rgba(168, 85, 247, 0.2);border-top-color:#A855F7;animation:spin 1s linear infinite;display:none}
#loading{width:52px;height:52px}#buffer{width:86px;height:86px}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

#error{position:absolute;inset:0;z-index:999;background:rgba(0,0,0,.94);color:#A855F7;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#error button{border:0;background:#A855F7;color:#fff;border-radius:999px;padding:11px 18px;font-weight:800;font-family:Tajawal;margin-top:10px}

.top{position:absolute;top:0;right:0;left:auto;z-index:80;padding:14px 16px;background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);display:flex;flex-direction:row;justify-content: flex-start;align-items:center;gap:10px;opacity:0;transition:.25s;pointer-events:none;width:100%}
.top.visible,.bottom.visible,.center.visible{opacity:1;pointer-events:auto}
.title{color:#A855F7;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw;text-align:right;text-shadow:0 1px 2px #000}
.btn,.icon{border:1px solid rgba(168, 85, 247, 0.3);background:rgba(0,0,0,0.3);color:#A855F7;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-shadow:0 1px 2px #000}
.btn{width:42px;height:42px}.icon{width:42px;height:42px}

.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;gap:20px;align-items:center;opacity:0;transition:.25s;z-index:80;pointer-events:none}
.center.visible{pointer-events:auto}
.circle{border:1px solid rgba(168, 85, 247, 0.3);background:rgba(0,0,0,0.2);color:#A855F7;border-radius:999px;display:flex;align-items:center;justify-content:center;text-shadow:0 1px 2px #000}
.big{width:76px;height:76px}.seek{width:58px;height:58px;position:relative}.seek .num{position:absolute;font-size:13px;font-weight:900}

.bottom{position:absolute;left:0;right:0;bottom:0;z-index:80;padding:12px 14px 15px;background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);opacity:0;transition:.25s;pointer-events:none}
.bottom.visible{pointer-events:auto}
.progress{height:5px;background:rgba(168, 85, 247, 0.2);border-radius:999px;position:relative;margin-bottom:12px;overflow:hidden;cursor:pointer}
.played{position:absolute;left:0;top:0;bottom:0;width:0;background:#A855F7}.thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#A855F7}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;direction:ltr;width:100%}
.icons{display:flex;gap:10px;direction:rtl;justify-content:flex-start;flex:0 1 auto;margin-left:auto;overflow-x:auto;scrollbar-width:none}
.icons::-webkit-scrollbar{display:none}
.time{color:#A855F7;font-size:14px;direction:ltr;min-width:110px;text-align:left;flex:0 0 auto}
.live{display:none;color:#A855F7;font-weight:900;align-items:center;gap:7px;direction:ltr;flex:0 0 auto}.live span{width:8px;height:8px;background:#ff00ea;border-radius:50%;box-shadow:0 0 10px #ff00ea;animation:pulse 1.5s infinite}

@keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}

#tapStart{
    position:absolute;inset:0;z-index:200;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;
    background: radial-gradient(circle, #2d1b4d 0%, #000000 100%);
    padding:20px;cursor:pointer;
}
#tapStart.show{display:flex}
.welcome-msg { font-size: 26px; font-weight: 800; margin-bottom: 10px; color: #A855F7; text-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
.click-msg { font-size: 16px; opacity: 0.8; font-weight: 400; letter-spacing: 1px; }

.footer-credit {
    position: absolute;
    bottom: 5px;
    left: 5px;
    font-size: 9px;
    color: rgba(168, 85, 247, 0.5);
    z-index: 50;
    pointer-events: none;
}
</style>
</head>
<body>
<div id="player-root">
<div class="player-wrapper" id="wrap">
<div class="server-bar" id="serverBar"></div>
<video id="video" playsinline webkit-playsinline x-webkit-airplay="allow" preload="auto" autoplay></video>

<div id="tapStart">
    <div class="welcome-msg">مرحباً بكم في Beryan TV</div>
    <div class="click-msg">اضغط لبدء البث المباشر</div>
</div>

<div class="top" id="top">
    <button class="btn" id="back" title="رجوع"><i data-feather="arrow-right"></i></button>
    <div class="title" id="title">Beryan Player</div>
</div>

<div id="loading"></div><div id="buffer"></div>

<div id="error">
    <i data-feather="alert-triangle" style="width:48px;height:48px;margin-bottom:10px"></i>
    <h3 id="errTitle">خطأ في المشغل</h3>
    <p id="errMsg">تعذر تشغيل الرابط</p>
    <button id="retry">إعادة التحميل</button>
</div>

<div class="center" id="center">
  <button class="circle seek" id="rew"><i data-feather="rotate-ccw"></i><div class="num">10</div></button>
  <button class="circle big" id="play"><i data-feather="pause"></i></button>
  <button class="circle seek" id="fwd"><i data-feather="rotate-cw"></i><div class="num">10</div></button>
</div>

<div class="bottom" id="bottom">
  <div class="progress" id="progress"><div class="played" id="played"></div><div class="thumb" id="thumb"></div></div>
  <div class="row">
    <div class="time" id="time">00:00 • 00:00</div>
    <div class="live" id="live"><span></span>LIVE</div>
    <div class="icons">
      <button class="icon" id="fullBtn" title="ملء الشاشة"><i data-feather="maximize"></i></button>
      <button class="icon" id="fit" title="تغيير العرض"><i data-feather="maximize-2"></i></button>
      <button class="icon" id="mute" title="الصوت"><i data-feather="volume-2"></i></button>
    </div>
  </div>
</div>
<div class="footer-credit">تطوير: علي يعقوب (ROMEO)</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.addEventListener("gesturestart", e => e.preventDefault());
  feather.replace();
  
  const $ = id => document.getElementById(id);
  const video = $("video"), topBar = $("top"), bottom = $("bottom"), center = $("center"), loading = $("loading"), buffer = $("buffer"), errorBox = $("error");
  const titleEl = $("title"), playBtn = $("play"), muteBtn = $("mute"), fitBtn = $("fit"), progress = $("progress"), played = $("played"), thumb = $("thumb"), time = $("time"), live = $("live"), serverBar = $("serverBar"), wrap = $("wrap"), tapStart = $("tapStart"), fullBtn = $("fullBtn");
  
  const WORKER = "https://ali.albesriali8.workers.dev/";
  let hls = null, shakaPlayer = null, hideTimer = null, fitIndex = 0, activeServerIndex = 0;

  const getP = () => new URLSearchParams(location.search);
  const get = k => { let v = getP().get(k)||""; try{v=decodeURIComponent(v)}catch{} return v; };

  function decodeServersParam(){
    let raw = get("servers"); 
    if(!raw) return null; 
    try { return JSON.parse(decodeURIComponent(escape(atob(raw)))) } catch { return null }
  }

  function getParams(){
    const s = decodeServersParam(); 
    if(s?.servers?.[activeServerIndex]) return s.servers[activeServerIndex]; 
    return {url:get("url"), title:get("title")||"Beryan Player", ck:get("ck"), ref:get("ref"), ua:get("ua")||navigator.userAgent};
  }

  const isMpd = u => (u||"").toLowerCase().includes(".mpd");
  const isMp4 = u => (u||"").toLowerCase().includes(".mp4");
  const proxyUrl = (u,ref,ua) => {
    const p = new URLSearchParams();
    p.set("url", u.replace("#hls",""));
    p.set("ua", ua || navigator.userAgent);
    try { const x = new URL(u.replace("#hls","")); p.set("ref", ref || x.origin + "/") } catch{}
    return WORKER + "?" + p.toString();
  };
  const finalUrl = p => (isMpd(p.url) || isMp4(p.url) ? p.url : proxyUrl(p.url, p.ref, p.ua));

  function hideControls(){
    topBar.classList.remove("visible"); 
    bottom.classList.remove("visible"); 
    center.classList.remove("visible"); 
    serverBar.style.opacity="0";
  }
  
  function showControls(){
    topBar.classList.add("visible"); 
    bottom.classList.add("visible"); 
    center.classList.add("visible"); 
    serverBar.style.opacity="1";
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideControls, 4000);
  }

  function setPlayIcon(){ playBtn.innerHTML = `<i data-feather="${video.paused?'play':'pause'}"></i>`; feather.replace(); }
  function setMuteIcon(){ muteBtn.innerHTML = `<i data-feather="${video.muted?'volume-x':'volume-2'}"></i>`; feather.replace(); }
  const fmt = s => !isFinite(s)||s<0 ? "00:00" : `${Math.floor(s/60)%60}`.padStart(2,"0")+":"+`${Math.floor(s%60)}`.padStart(2,"0");
  
  function updateProgress(){
    const d=video.duration||0, c=video.currentTime||0;
    if(d>0 && isFinite(d)){
      const r=(c/d)*100; played.style.width=r+"%"; thumb.style.left=r+"%"; time.style.display="block"; live.style.display="none"; time.textContent=`${fmt(c)} • ${fmt(d)}`;
    }else{
      played.style.width="100%"; thumb.style.left="100%"; time.style.display="none"; live.style.display="flex";
    }
  }

  async function startVideoAfterLoad(){
    tapStart.classList.remove("show");
    try { await video.play(); } catch { tapStart.classList.add("show"); }
    setPlayIcon(); showControls();
  }

  async function destroyPlayers(){
    if(hls) { hls.destroy(); hls = null; }
    if(shakaPlayer) { await shakaPlayer.destroy().catch(()=>{}); shakaPlayer = null; }
    video.removeAttribute("src"); video.load();
  }

  async function playStream(){
    const p = getParams(); 
    if(!p.url) { errorBox.style.display="flex"; return; }
    titleEl.textContent = p.title; errorBox.style.display="none"; loading.style.display="block";

    try {
      await destroyPlayers();
      const src = finalUrl(p);

      if(isMp4(p.url)){
        video.src = src; video.load(); loading.style.display="none"; await startVideoAfterLoad(); return;
      }

      if(isMpd(p.url)){
        shaka.polyfill.installAll(); shakaPlayer = new shaka.Player(video);
        if(p.ck) { const [kid,key] = p.ck.split(":"); shakaPlayer.configure({drm:{clearKeys:{[kid.trim()]:key.trim()}}}); }
        shakaPlayer.getNetworkingEngine().registerRequestFilter((type,req)=>{ if(p.ua)req.headers["User-Agent"]=p.ua; if(p.ref)req.headers["Referer"]=p.ref; });
        await shakaPlayer.load(src); loading.style.display="none"; await startVideoAfterLoad();
      } else {
        if(Hls.isSupported()){
          hls = new Hls({
            enableWorker: true, lowLatencyMode: true,
            backBufferLength: 30, maxBufferLength: 10, maxMaxBufferLength: 20,
            xhrSetup: (xhr) => {
              if (p.ua) xhr.setRequestHeader("User-Agent", p.ua);
              if (p.ref) xhr.setRequestHeader("Referer", p.ref);
            }
          });
          hls.loadSource(src); hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, async () => { loading.style.display="none"; await startVideoAfterLoad(); });
          hls.on(Hls.Events.ERROR, (e, d) => { if(d.fatal) { if(d.type===Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad(); else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError(); else errorBox.style.display="flex"; } });
        } else { video.src = src; video.load(); loading.style.display="none"; await startVideoAfterLoad(); }
      }
    } catch(e) { errorBox.style.display="flex"; loading.style.display="none"; }
  }

  playBtn.onclick = async e => { e.stopPropagation(); video.paused ? await video.play() : video.pause(); setPlayIcon(); showControls(); };
  $("rew").onclick = e => { e.stopPropagation(); video.currentTime -= 10; showControls(); };
  $("fwd").onclick = e => { e.stopPropagation(); video.currentTime += 10; showControls(); };
  muteBtn.onclick = e => { e.stopPropagation(); video.muted = !video.muted; setMuteIcon(); showControls(); };
  fitBtn.onclick = e => { e.stopPropagation(); const modes=["fit-contain","fit-cover","fit-fill"]; video.classList.remove(...modes); fitIndex=(fitIndex+1)%3; video.classList.add(modes[fitIndex]); showControls(); };
  
  fullBtn.onclick = async e => {
    e.stopPropagation();
    if (!document.fullscreenElement) await wrap.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
    showControls();
  };

  progress.onclick = e => {
    const r = progress.getBoundingClientRect();
    video.currentTime = ((e.clientX - r.left) / r.width) * video.duration;
    showControls();
  };

  tapStart.onclick = () => startVideoAfterLoad();
  $("back").onclick = () => history.back();
  video.addEventListener("waiting", () => buffer.style.display="block");
  video.addEventListener("playing", () => buffer.style.display="none");
  video.addEventListener("timeupdate", updateProgress);
  wrap.onclick = showControls;
  $("retry").onclick = () => playStream();
  playStream();
});
</script>
</body>
</html>
