<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XPola Premium Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-color: #00ff88; --glass: rgba(255, 255, 255, 0.1); }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* تدوير المشغل تلقائياً في وضع الموبايل */
        #video-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* الأزرار المركزية */
        .mid-controls { position: absolute; display: flex; align-items: center; gap: 40px; z-index: 30; transition: 0.4s; }
        .btn-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2); 
            color: white; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; backdrop-filter: blur(10px); font-size: 20px;
        }
        .btn-play { width: 95px; height: 95px; font-size: 35px; border: 2px solid white; box-shadow: 0 0 20px rgba(0,255,136,0.2); }

        /* الواجهة السفلية */
        .bottom-ui { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            padding: 30px 50px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            z-index: 30; transition: 0.5s ease;
        }
        
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-bottom: 25px; border-radius: 10px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--main-color); width: 0%; box-shadow: 0 0 10px var(--main-color); border-radius: 10px; }

        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .live-tag { color: white; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 14px; letter-spacing: 1px; }
        .live-dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: pulse 1.5s infinite; }

        /* الأيقونات الستة المطلوبة */
        .icon-group { display: flex; gap: 12px; }
        .icon-btn { 
            width: 45px; height: 45px; background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; 
            color: white; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; font-size: 18px;
        }
        .icon-btn:hover { background: var(--main-color); color: black; transform: translateY(-3px); }

        /* تأثيرات الإخفاء */
        .hide { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .bottom-ui.hide { transform: translateY(100%); opacity: 0; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .loader { 
            position: absolute; width: 60px; height: 60px; 
            border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--main-color); 
            border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 40; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* تدوير الشاشة تلقائياً للهواتف */
        @media screen and (orientation: portrait) {
            #video-container { transform: rotate(90deg); width: 100vh; height: 100vw; transform-origin: center; position: fixed; top: 50%; left: 50%; margin-top: -50vw; margin-left: -50vh; }
        }
    </style>
</head>
<body>

<div id="video-container">
    <div class="loader" id="loader"></div>
    <video id="video" playsinline></video>

    <div class="mid-controls ui-el">
        <div class="btn-circle" onclick="skip(-10)"><i class="fas fa-undo"></i></div>
        <div class="btn-circle btn-play" id="playBtn"><i class="fas fa-play"></i></div>
        <div class="btn-circle" onclick="skip(10)"><i class="fas fa-redo"></i></div>
    </div>

    <div class="bottom-ui ui-el">
        <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div class="flex-row">
            <div class="live-tag"><div class="live-dot"></div> LIVE</div>
            
            <div class="icon-group">
                <div class="icon-btn"><i class="fas fa-expand-arrows-alt"></i></div>
                <div class="icon-btn"><i class="fas fa-volume-up"></i></div>
                <div class="icon-btn"><i class="fas fa-closed-captioning"></i></div>
                <div class="icon-btn"><i class="fas fa-cog"></i></div>
                <div class="icon-btn"><i class="fas fa-cast"></i></div>
                <div class="icon-btn" onclick="toggleFull()"><i class="fas fa-expand"></i></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const loader = document.getElementById('loader');
    const playBtn = document.getElementById('playBtn');
    const uiElements = document.querySelectorAll('.ui-el');
    let hls, timer;

    // استلام الرابط المولد وتشغيله
    function init() {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('servers');
        if(data) {
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(data))));
                const streamUrl = decoded[0].u;
                
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.play();
                }
            } catch(e) { console.error("Error loading stream"); }
        }
    }

    // أزرار التحكم
    playBtn.onclick = () => {
        if(video.paused) { video.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
        else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
    }

    function skip(s) { video.currentTime += s; }
    function toggleFull() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // إخفاء الواجهة تلقائياً
    function resetTimer() {
        uiElements.forEach(el => el.classList.remove('hide'));
        clearTimeout(timer);
        timer = setTimeout(() => { if(!video.paused) uiElements.forEach(el => el.classList.add('hide')); }, 3500);
    }

    video.onplaying = () => { loader.style.display = "none"; playBtn.innerHTML = '<i class="fas fa-pause"></i>'; resetTimer(); };
    video.onwaiting = () => { loader.style.display = "block"; };
    video.ontimeupdate = () => { document.getElementById('p-fill').style.width = (video.currentTime / video.duration) * 100 + '%'; };
    
    document.getElementById('video-container').onclick = resetTimer;
    window.onload = init;
</script>
</body>
</html>
