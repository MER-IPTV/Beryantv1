<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>BSR Player Red Edition</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000000"/>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden;overscroll-behavior:none;touch-action:manipulation}
body{position:fixed;inset:0;padding:0!important;background:#000}
#player-root,.player-wrapper{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;overflow:hidden}

/* تحسينات الدوران البرمجي */
video, .top, .bottom, .center, .server-bar { transition: all 0.3s ease; }

video{position:absolute;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;object-fit:fill;filter:contrast(1.06) saturate(1.12)}
video.fit-contain{object-fit:contain!important}
video.fit-cover{object-fit:cover!important}
video.fit-fill{object-fit:fill!important}

/* وضع الدوران 90 درجة يدوياً */
.rotate-90-active video {
  width: 100vh !important;
  height: 100vw !important;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover !important;
}

.rotate-90-active .top, 
.rotate-90-active .bottom,
.rotate-90-active .server-bar {
  width: 100vh !important;
  transform-origin: center;
}

.rotate-90-active .top {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(90deg) translateY(calc(-50vw + 35px));
}

.rotate-90-active .bottom {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(90deg) translateY(calc(50vw - 60px));
}

.rotate-90-active .center {
  transform: translate(-50%, -50%) rotate(90deg);
}

.rotate-90-active .server-bar {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(90deg) translateY(calc(-50vw + 85px));
}

/* تدوير الأيقونات لتظل معدولة للمستخدم */
.rotate-90-active .icon i, 
.rotate-90-active .btn i, 
.rotate-90-active .circle i,
.rotate-90-active .title,
.rotate-90-active .time,
.rotate-90-active .server-btn {
  transform: rotate(-90deg);
}

/* تخصيص الألوان باللون الأحمر */
.server-bar{position:absolute;top:16px;left:12px;right:auto;z-index:130;display:none;gap:8px;padding:6px;max-width:min(72vw,760px);overflow-x:auto;direction:ltr;background:transparent;border:0;border-radius:999px;scrollbar-width:none;opacity:0;transition:.25s}
.server-bar.visible{display:flex;opacity:1}
.server-bar.hide{opacity:0;pointer-events:none}
.server-btn{flex:0 0 auto;border:1px solid rgba(255,0,0,0.5);background:transparent;color:#ff0000;padding:8px 14px;border-radius:999px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer;white-space:nowrap;text-shadow:0 1px 2px #000}
.server-btn.active{background:#ff0000;color:#fff;border-color:#ff0000}

.btn, .icon, .circle {
  border: 1px solid rgba(255, 0, 0, 0.6) !important;
  background: transparent;
  color: #ff0000 !important;
}

.played { background: #ff0000 !important; }
.thumb { background: #ff0000 !important; }
.live span { background: #ff0000 !important; box-shadow: 0 0 10px #ff0000 !important; }
#loading, #buffer { border: 5px solid rgba(255,0,0,0.2); border-top-color: #ff0000 !important; }

#loading,#buffer{position:absolute;z-index:60;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:spin 1s linear infinite;display:none}
#loading{width:52px;height:52px}#buffer{width:86px;height:86px}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

#error{position:absolute;inset:0;z-index:999;background:rgba(0,0,0,.94);color:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#error button{border:0;background:#ff0000;color:#fff;border-radius:999px;padding:11px 18px;font-weight:800;font-family:Tajawal}

.top{position:absolute;top:0;right:0;left:auto;z-index:80;padding:14px 16px;background:transparent;display:flex;flex-direction:row;justify-content:flex-start;align-items:center;gap:10px;opacity:0;transition:.25s;pointer-events:none}
.top.visible,.bottom.visible,.center.visible{opacity:1;pointer-events:auto}
.title{color:#fff;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw;text-align:right;text-shadow:0 1px 2px #000}
.btn,.icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:14px}

.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;gap:20px;align-items:center;opacity:0;transition:.25s;z-index:80;pointer-events:none}
.circle{display:flex;align-items:center;justify-content:center;border-radius:999px}
.big{width:76px;height:76px}.seek{width:58px;height:58px;position:relative}.seek .num{position:absolute;font-size:13px;font-weight:900}

.bottom{position:absolute;left:0;right:0;bottom:0;z-index:80;padding:12px 14px 15px;background:transparent;opacity:0;transition:.25s;pointer-events:none}
.progress{height:5px;background:rgba(255,255,255,.25);border-radius:999px;position:relative;margin-bottom:12px;overflow:hidden}
.played{position:absolute;left:0;top:0;bottom:0;width:0}.thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;direction:ltr;width:100%}
.icons{display:flex;gap:10px;direction:rtl;justify-content:flex-start;flex:0 1 auto;margin-left:auto;overflow-x:auto;scrollbar-width:none}
.time{color:#fff;font-size:14px;direction:ltr;min-width:110px;text-align:left;flex:0 0 auto}
.live{display:none;color:#fff;font-weight:900;align-items:center;gap:7px;direction:ltr;flex:0 0 auto}.live span{width:8px;height:8px;border-radius:50%}
#toast{position:absolute;bottom:112px;left:50%;transform:translateX(-50%);background:rgba(255,0,0,0.8);color:#fff;padding:8px 14px;border-radius:999px;display:none;z-index:100;font-weight:700}

#tapStart{position:absolute;inset:0;z-index:70;display:none;align-items:center;justify-content:center;color:#ff0000;font-weight:900;font-size:18px;text-align:center;background:#000;padding:20px}
#tapStart.show{display:flex}

@media (max-width:760px){
  .top{padding:10px 12px}.title{font-size:14px;max-width:36vw}.icon{width:40px;height:40px}.big{width:68px;height:68px}.seek{width:52px;height:52px}.server-bar{top:10px;left:10px;max-width:58vw}
}
</style>
</head>
<body>
<div id="player-root">
<div class="player-wrapper" id="wrap">
<div class="server-bar" id="serverBar"></div>
<video id="video" playsinline webkit-playsinline x-webkit-airplay="allow" preload="auto" autoplay></video>
<div id="tapStart">اضغط على الشاشة للتشغيل</div>

<div class="top" id="top">
  <button class="btn" id="back"><i data-feather="arrow-right"></i></button>
  <div class="title" id="title">BSR Player</div>
</div>

<div id="loading"></div><div id="buffer"></div>

<div id="error">
  <i data-feather="alert-triangle"></i>
  <h3 id="errTitle">خطأ في المشغل</h3>
  <p id="errMsg">تعذر تشغيل الرابط</p>
  <button id="retry">إعادة التحميل</button>
</div>

<div class="center" id="center">
  <button class="circle seek" id="rew"><i data-feather="rotate-ccw"></i><div class="num">5</div></button>
  <button class="circle big" id="play"><i data-feather="pause"></i></button>
  <button class="circle seek" id="fwd"><i data-feather="rotate-cw"></i><div class="num">15</div></button>
</div>

<div class="bottom" id="bottom">
  <div class="progress" id="progress"><div class="played" id="played"></div><div class="thumb" id="thumb"></div></div>
  <div class="row">
    <div class="time" id="time">00:00 • 00:00</div>
    <div class="live" id="live"><span></span>LIVE</div>
    <div class="icons">
      <button class="icon" id="fullBtn"><i data-feather="maximize"></i></button>
      <button class="icon" id="pipBtn"><i data-feather="airplay"></i></button>
      <button class="icon" id="castBtn"><i data-feather="cast"></i></button>
      <button class="icon" id="quality"><i data-feather="settings"></i></button>
      <button class="icon" id="ccBtn"><i data-feather="message-square"></i></button>
      <button class="icon" id="mute"><i data-feather="volume-x"></i></button>
      <button class="icon" id="fit"><i data-feather="maximize-2"></i></button>
    </div>
  </div>
</div>

<div id="toast"></div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  feather.replace();
  const $ = id => document.getElementById(id);
  const video = $("video"), topBar = $("top"), bottom = $("bottom"), center = $("center"), loading = $("loading"), buffer = $("buffer"), errorBox = $("error");
  const playBtn = $("play"), muteBtn = $("mute"), fitBtn = $("fit"), wrap = $("wrap"), tapStart = $("tapStart"), serverBar = $("serverBar");
  const WORKER = "https://ali.albesriali8.workers.dev/";
  let hls = null, shakaPlayer = null, hideTimer = null, fitIndex = 0, isRotated = false;

  const getP = () => new URLSearchParams(location.search);
  const get = k => { let v = getP().get(k)||""; try{v=decodeURIComponent(v)}catch{} return v; };
  function decodeServersParam(){let raw=get("servers"); if(!raw)return null; try{return JSON.parse(decodeURIComponent(escape(atob(raw))))}catch{return null}}

  function buildServerButtons(){
    const data=decodeServersParam(); if(!data||!Array.isArray(data.servers)||!data.servers.length)return;
    serverBar.innerHTML=data.servers.map((s,i)=>`<button class="server-btn ${i===0?'active':''}" data-index="${i}">${s.name||'Server '+(i+1)}</button>`).join("");
    serverBar.classList.add("visible");
    serverBar.querySelectorAll(".server-btn").forEach(btn=>{
      btn.onclick=e=>{e.stopPropagation(); buildServerButtons(); playStream(); showControls();};
    });
  }

  async function playStream(){
    const url = get("url"); if(!url) return;
    loading.style.display="block";
    // (هنا توضع منطق التشغيل الخاص بك HLS/Shaka كما في الكود السابق)
    video.src = url.includes("mp4") ? url : WORKER + "?url=" + encodeURIComponent(url);
    video.play().then(() => { loading.style.display="none"; }).catch(() => { tapStart.classList.add("show"); });
  }

  function showControls(){
    [topBar, bottom, center, serverBar].forEach(el => el.classList.add("visible"));
    serverBar.classList.remove("hide");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      [topBar, bottom, center, serverBar].forEach(el => el.classList.remove("visible"));
      serverBar.classList.add("hide");
    }, 3000);
  }

  fitBtn.onclick = e => {
    e.stopPropagation();
    isRotated = !isRotated;
    if(isRotated){
      wrap.classList.add("rotate-90-active");
    } else {
      wrap.classList.remove("rotate-90-active");
      const modes=["fit-fill","fit-contain","fit-cover"];
      video.classList.remove(...modes);
      fitIndex=(fitIndex+1)%modes.length;
      video.classList.add(modes[fitIndex]);
    }
    showControls();
  };

  playBtn.onclick = e => { e.stopPropagation(); video.paused ? video.play() : video.pause(); feather.replace(); };
  wrap.onclick = showControls;
  
  buildServerButtons();
  playStream();
  showControls();
});
</script>
</body>
</html>
