<html dir="rtl" lang="ar"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/><title>BSR Player Gold Edition</title><meta name="mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="theme-color" content="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
<style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden;overscroll-behavior:none;touch-action:manipulation}body{position:fixed;inset:0;padding:0!important;background:#000}#player-root,.player-wrapper{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;overflow:hidden}video{position:absolute;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;object-fit:fill;filter:contrast(1.06) saturate(1.12)}video.fit-contain{object-fit:contain!important}video.fit-cover{object-fit:cover!important}video.fit-fill{object-fit:fill!important}
.server-bar{position:absolute;top:16px;left:12px;right:auto;z-index:130;display:none;gap:8px;padding:6px;max-width:min(72vw,760px);overflow-x:auto;direction:ltr;background:transparent;border:0;border-radius:999px;scrollbar-width:none;opacity:0;transition:.25s}.server-bar::-webkit-scrollbar{display:none}.server-bar.visible{display:flex;opacity:1}.server-bar.hide{opacity:0;pointer-events:none}.server-btn{flex:0 0 auto;border:1px solid rgba(212,175,55,.4);background:transparent;color:#fff;padding:8px 14px;border-radius:999px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer;white-space:nowrap;text-shadow:0 1px 2px #000}.server-btn.active{background:#D4AF37;color:#000;border-color:#D4AF37}
#loading,#buffer{position:absolute;z-index:60;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:5px solid rgba(212,175,55,.2);border-top-color:#D4AF37;animation:spin 1s linear infinite;display:none}#loading{width:52px;height:52px}#buffer{width:86px;height:86px}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
#error{position:absolute;inset:0;z-index:999;background:rgba(0,0,0,.94);color:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}#error button{border:0;background:#D4AF37;color:#000;border-radius:999px;padding:11px 18px;font-weight:800;font-family:Tajawal}
.top{position:absolute;top:0;right:0;left:auto;z-index:80;padding:14px 16px;background:transparent;display:flex;flex-direction:row;justify-content:flex-start;align-items:center;gap:10px;opacity:0;transition:.25s;pointer-events:none}.top.visible,.bottom.visible,.center.visible{opacity:1;pointer-events:auto}.title{color:#D4AF37;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw;text-align:right;text-shadow:0 1px 2px #000}.btn,.icon{border:1px solid rgba(212,175,55,.3);background:transparent;color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-shadow:0 1px 2px #000}.btn{width:42px;height:42px}.icon{width:42px;height:42px}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;gap:20px;align-items:center;opacity:0;transition:.25s;z-index:80;pointer-events:none}.center.visible{pointer-events:auto}.circle{border:1px solid rgba(212,175,55,.4);background:transparent;color:#fff;border-radius:999px;display:flex;align-items:center;justify-content:center;text-shadow:0 1px 2px #000}.big{width:76px;height:76px;border-color:#D4AF37;color:#D4AF37}.seek{width:58px;height:58px;position:relative}.seek .num{position:absolute;font-size:13px;font-weight:900}
.bottom{position:absolute;left:0;right:0;bottom:0;z-index:80;padding:12px 14px 15px;background:transparent;opacity:0;transition:.25s;pointer-events:none}.bottom.visible{pointer-events:auto}.progress{height:5px;background:rgba(255,255,255,.2);border-radius:999px;position:relative;margin-bottom:12px;overflow:hidden}.played{position:absolute;left:0;top:0;bottom:0;width:0;background:#D4AF37}.thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#D4AF37}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;direction:ltr;width:100%}.icons{display:flex;gap:10px;direction:rtl;justify-content:flex-start;flex:0 1 auto;margin-left:auto;overflow-x:auto;scrollbar-width:none}.icons::-webkit-scrollbar{display:none}.time{color:#fff;font-size:14px;direction:ltr;min-width:110px;text-align:left;flex:0 0 auto}.live{display:none;color:#D4AF37;font-weight:900;align-items:center;gap:7px;direction:ltr;flex:0 0 auto}.live span{width:8px;height:8px;background:#D4AF37;border-radius:50%;box-shadow:0 0 10px #D4AF37}.menu{position:absolute;bottom:76px;right:12px;left:auto;z-index:100;min-width:190px;background:#000;border:1px solid rgba(212,175,55,.3);border-radius:15px;padding:7px;display:none}.menu.visible{display:block}.menu button{width:100%;border:0;background:transparent;color:#fff;padding:12px;border-radius:12px;text-align:right;font-family:Tajawal;font-weight:700}.menu button.active,.menu button:hover{background:rgba(212,175,55,.15);color:#D4AF37}#toast{position:absolute;bottom:112px;left:50%;transform:translateX(-50%);background:rgba(212,175,55,.9);color:#000;padding:8px 18px;border-radius:999px;display:none;z-index:200;font-weight:800;white-space:nowrap;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
#tapStart{position:absolute;inset:0;z-index:70;display:none;align-items:center;justify-content:center;color:#D4AF37;font-weight:900;font-size:18px;text-align:center;background:#000;padding:20px}#tapStart.show{display:flex}@supports(height:100dvh){#player-root,.player-wrapper,video{height:100dvh}}@media (max-width:760px){.top{padding:10px 12px}.title{font-size:14px;max-width:36vw}.icon{width:40px;height:40px}.big{width:68px;height:68px}.server-bar{max-width:58vw}}</style></head>
<body><div id="player-root"><div class="player-wrapper" id="wrap">
<div class="server-bar" id="serverBar"></div><video id="video" playsinline webkit-playsinline x-webkit-airplay="allow" preload="auto" autoplay></video>
<div id="tapStart">اضغط للتشغيل وتفعيل ملء الشاشة</div>
<div class="top" id="top"><button class="btn" id="back"><i data-feather="arrow-right"></i></button><div class="title" id="title">BSR Player</div></div>
<div id="loading"></div><div id="buffer"></div>
<div id="error"><i data-feather="alert-triangle"></i><h3 id="errTitle">خطأ</h3><p id="errMsg">تعذر التشغيل</p><button id="retry">إعادة تحميل</button></div>
<div class="center" id="center"><button class="circle seek" id="rew"><i data-feather="rotate-ccw"></i><div class="num">5</div></button><button class="circle big" id="play"><i data-feather="pause"></i></button><button class="circle seek" id="fwd"><i data-feather="rotate-cw"></i><div class="num">15</div></button></div>
<div class="bottom" id="bottom"><div class="progress" id="progress"><div class="played" id="played"></div><div class="thumb" id="thumb"></div></div><div class="row"><div class="time" id="time">00:00 • 00:00</div><div class="live" id="live"><span></span>LIVE</div><div class="icons"><button class="icon" id="fullBtn"><i data-feather="maximize"></i></button><button class="icon" id="pipBtn"><i data-feather="airplay"></i></button><button class="icon" id="castBtn"><i data-feather="cast"></i></button><button class="icon" id="quality"><i data-feather="settings"></i></button><button class="icon" id="mute"><i data-feather="volume-x"></i></button><button class="icon" id="fit"><i data-feather="maximize-2"></i></button></div></div></div>
<div class="menu" id="qMenu"></div><div id="toast"></div></div></div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    feather.replace();
    const $ = id => document.getElementById(id);
    const video = $("video"), topBar = $("top"), bottom = $("bottom"), center = $("center"), loading = $("loading"), buffer = $("buffer"), errorBox = $("error"), toast = $("toast"), tapStart = $("tapStart"), serverBar = $("serverBar"), fullBtn = $("fullBtn");
    let hideTimer = null, fitIndex = 0, activeServerIndex = 0;
    const WORKER = "https://ali.albesriali8.workers.dev/";

    const getP = () => new URLSearchParams(location.search);
    const get = k => { let v = getP().get(k)||""; try{v=decodeURIComponent(v)}catch{} return v; };
    function decodeServers(){ let raw=get("servers"); if(!raw)return null; try{return JSON.parse(decodeURIComponent(escape(atob(raw))))}catch{return null} }

    function flash(t){ toast.textContent=t; toast.style.display="block"; clearTimeout(window.tst); window.tst=setTimeout(()=>toast.style.display="none",2500); }

    async function forceMobileFullscreen(){
        flash("يرجى تفعيل خاصية دوران الشاشة 🔄");
        try{ if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen({navigationUI:"hide"}); }catch{}
        try{ if(screen.orientation?.lock) await screen.orientation.lock("landscape").catch(()=>{}); }catch{}
    }

    function showControls(){ [topBar, bottom, center].forEach(el=>el.classList.add("visible")); serverBar.classList.remove("hide"); clearTimeout(hideTimer); hideTimer=setTimeout(hideControls,3000); }
    function hideControls(){ [topBar, bottom, center].forEach(el=>el.classList.remove("visible")); serverBar.classList.add("hide"); }

    fullBtn.onclick = async e => { e.stopPropagation(); await forceMobileFullscreen(); showControls(); };
    tapStart.onclick = async e => { e.stopPropagation(); await forceMobileFullscreen(); tapStart.classList.remove("show"); video.play(); };

    // الإعدادات الافتراضية للتشغيل
    const isMpd=u=>u.includes(".mpd");
    const isMp4=u=>u.includes(".mp4");
    const proxyUrl=(u,ref,ua)=>{const p=new URLSearchParams();p.set("url",u);p.set("ua",ua||navigator.userAgent);return WORKER+"?"+p.toString()};

    async function playStream(){
        const data = decodeServers();
        const p = (data && data.servers[activeServerIndex]) ? data.servers[activeServerIndex] : {url:get("url"), title:get("title")||"BSR Gold"};
        $("title").textContent = p.title;
        loading.style.display="block";
        
        const src = (isMpd(p.url)||isMp4(p.url)) ? p.url : proxyUrl(p.url, p.ref, p.ua);
        video.src = src;
        video.load();
        video.play().catch(()=>{ tapStart.classList.add("show"); });
        loading.style.display="none";
    }

    // أزرار التحكم الأساسية
    $("play").onclick=()=>{ if(video.paused) video.play(); else video.pause(); showControls(); };
    video.onplay=()=>{ $("play").innerHTML='<i data-feather="pause"></i>'; feather.replace(); };
    video.onpause=()=>{ $("play").innerHTML='<i data-feather="play"></i>'; feather.replace(); };
    $("mute").onclick=()=>{ video.muted=!video.muted; flash(video.muted?"كتم الصوت":"تشغيل الصوت"); };
    $("fit").onclick=()=>{ const modes=["fit-fill","fit-contain","fit-cover"], names=["تمدد","ملاءمة","قص"]; video.classList.remove(...modes); fitIndex=(fitIndex+1)%3; video.classList.add(modes[fitIndex]); flash("العرض: "+names[fitIndex]); };
    
    // شريط التقدم
    video.ontimeupdate=()=>{
        const d=video.duration, c=video.currentTime;
        if(d){
            const p=(c/d)*100; $("played").style.width=p+"%"; $("thumb").style.left=p+"%";
            $("time").textContent = `${Math.floor(c/60)}:${Math.floor(c%60).toString().padStart(2,'0')} • ${Math.floor(d/60)}:${Math.floor(d%60).toString().padStart(2,'0')}`;
        }
    };

    $("wrap").onclick=showControls;
    playStream();
});
</script></body></html>
