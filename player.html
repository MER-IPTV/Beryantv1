<html dir="rtl" lang="ar"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/><title>BSR Player Gold Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
<style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden;overscroll-behavior:none}
    
    /* الحاوية الرئيسية مع دعم التدوير السلس */
    #player-root {
        position: fixed; inset: 0; width: 100vw; height: 100dvh; background: #000; overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; align-items: center; justify-content: center;
    }

    /* إصلاح مقياس الصورة عند الدوران 90 درجة */
    #player-root.rotated-90 {
        transform: rotate(90deg);
        width: 100dvh !important;
        height: 100vw !important;
        inset: calc((100vw - 100dvh) / 2) calc((100dvh - 100vw) / 2);
    }

    .player-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    
    video { 
        position: absolute; inset: 0; width: 100%; height: 100%; background: #000; 
        object-fit: contain; transition: object-fit 0.3s;
    }

    /* التنسيق الذهبي الشفاف المستوحى من الصورة */
    .btn, .icon, .circle, .server-btn, .menu {
        background: rgba(212, 175, 55, 0.15) !important;
        border: 1px solid rgba(212, 175, 55, 0.4) !important;
        color: #fff !important;
        backdrop-filter: blur(8px);
        text-shadow: 0 1px 2px #000;
    }

    .server-btn.active, .played, .thumb {
        background: #d4af37 !important;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    /* العناصر العائمة */
    .server-bar { position: absolute; top: 16px; left: 12px; z-index: 130; display: none; gap: 8px; opacity: 0; transition: .25s; }
    .server-bar.visible { display: flex; opacity: 1; }
    .server-btn { padding: 8px 14px; border-radius: 999px; font-weight: 800; white-space: nowrap; }

    .top, .bottom, .center { position: absolute; z-index: 80; opacity: 0; transition: .25s; pointer-events: none; }
    .visible { opacity: 1 !important; pointer-events: auto !important; }

    .top { top: 0; right: 0; padding: 14px 16px; display: flex; align-items: center; gap: 10px; width: 100%; }
    .title { color: #d4af37; font-weight: 800; font-size: 15px; flex: 1; text-align: right; }

    .center { top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 20px; align-items: center; }
    .circle { border-radius: 999px; }
    .big { width: 76px; height: 76px; } .seek { width: 58px; height: 58px; }

    .bottom { bottom: 0; left: 0; right: 0; padding: 12px 14px 20px; }
    .progress { height: 5px; background: rgba(212, 175, 55, 0.2); border-radius: 999px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .played { position: absolute; left: 0; top: 0; bottom: 0; width: 0; }
    .thumb { position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); }

    .row { display: flex; align-items: center; justify-content: space-between; direction: ltr; }
    .icons { display: flex; gap: 10px; direction: rtl; }
    .time { color: #fff; font-size: 13px; font-weight: bold; }

    #loading { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        width: 50px; height: 50px; border: 4px solid rgba(212, 175, 55, 0.2); 
        border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 100;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    #toast { 
        position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); 
        background: rgba(0,0,0,0.75); color: #d4af37; padding: 8px 16px; 
        border-radius: 999px; border: 1px solid #d4af37; display: none; z-index: 200; 
    }
</style></head>
<body>

<div id="player-root">
    <div class="player-wrapper" id="wrap">
        <div id="loading"></div>
        <div class="server-bar" id="serverBar"></div>
        <video id="video" playsinline webkit-playsinline></video>
        
        <div class="top" id="top">
            <button class="btn" onclick="history.back()"><i data-feather="arrow-right"></i></button>
            <div class="title" id="title">BSR Player Gold</div>
        </div>

        <div class="center" id="center">
            <button class="circle seek" onclick="skip(-5)"><i data-feather="rotate-ccw"></i></button>
            <button class="circle big" id="playBtn"><i data-feather="play"></i></button>
            <button class="circle seek" onclick="skip(15)"><i data-feather="rotate-cw"></i></button>
        </div>

        <div class="bottom" id="bottom">
            <div class="progress" id="progress"><div class="played" id="played"></div><div class="thumb" id="thumb"></div></div>
            <div class="row">
                <div class="time" id="time">00:00 • 00:00</div>
                <div class="icons">
                    <button class="icon" id="rotateBtn"><i data-feather="repeat"></i></button>
                    <button class="icon" id="fullBtn"><i data-feather="maximize"></i></button>
                    <button class="icon" id="fitBtn"><i data-feather="maximize-2"></i></button>
                    <button class="icon" id="muteBtn"><i data-feather="volume-2"></i></button>
                </div>
            </div>
        </div>
        <div id="toast"></div>
    </div>
</div>

<script>
    feather.replace();
    const $ = id => document.getElementById(id);
    const video = $("video"), playerRoot = $("player-root"), playBtn = $("playBtn");
    let isRotated = false;

    // دالة الدوران الذكي مع إصلاح المقاييس
    $("rotateBtn").onclick = (e) => {
        e.stopPropagation();
        isRotated = !isRotated;
        if(isRotated) {
            playerRoot.classList.add("rotated-90");
            flash("تم التدوير 90 درجة");
        } else {
            playerRoot.classList.remove("rotated-90");
            flash("الوضع الطبيعي");
        }
    };

    // تبديل وضع العرض (Fit)
    let fitIndex = 0;
    $("fitBtn").onclick = (e) => {
        e.stopPropagation();
        const modes = ['contain', 'cover', 'fill'];
        const names = ['ملاءمة', 'قص', 'تمدد'];
        fitIndex = (fitIndex + 1) % modes.length;
        video.style.objectFit = modes[fitIndex];
        flash("العرض: " + names[fitIndex]);
    };

    // تشغيل وإيقاف
    playBtn.onclick = () => {
        if(video.paused) { video.play(); } else { video.pause(); }
        updatePlayIcon();
    };

    function updatePlayIcon() {
        playBtn.innerHTML = `<i data-feather="${video.paused ? 'play' : 'pause'}"></i>`;
        feather.replace();
    }

    // إظهار وإخفاء الواجهة
    let hideTimer;
    function showControls() {
        [$("top"), $("bottom"), $("center"), $("serverBar")].forEach(el => el.classList.add("visible"));
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            [$("top"), $("bottom"), $("center"), $("serverBar")].forEach(el => el.classList.remove("visible"));
        }, 3000);
    }

    $("wrap").onclick = showControls;
    video.ontimeupdate = () => {
        const p = (video.currentTime / video.duration) * 100;
        $("played").style.width = p + "%";
        $("thumb").style.left = p + "%";
        $("time").textContent = formatTime(video.currentTime) + " • " + formatTime(video.duration);
    };

    function formatTime(s) {
        if(!isFinite(s)) return "00:00";
        let m = Math.floor(s/60), sec = Math.floor(s%60);
        return m.toString().padStart(2,'0') + ":" + sec.toString().padStart(2,'0');
    }

    window.skip = (v) => video.currentTime += v;
    function flash(m) { const t=$("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none", 1500); }

    // تحميل البث (مثال HLS)
    if(Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
        hls.attachMedia(video);
    }
</script>
</body></html>
